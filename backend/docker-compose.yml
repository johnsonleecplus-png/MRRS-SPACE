version: '3.8'

services:
  nginx-web:
    image: nginx:latest
    container_name: my-website
    ports:
      - "8080:80"
    volumes:
      - ../dist:/usr/share/nginx/html:rw
    restart: always
    user: "0:0"
    depends_on:
      - backend

  backend:
    build: .
    container_name: website-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=your_password
      - DB_NAME=website_collection
    restart: always
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: website-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=your_password
      - MYSQL_DATABASE=website_collection
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: always

volumes:
  mysql-data:
